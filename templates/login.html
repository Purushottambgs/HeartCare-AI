{% extends 'base.html' %}
{% set title = 'HeartCare AI • Login' %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="form-card p-4 p-md-5 slide-up">
      <div class="text-center mb-4">
        <span class="brand-dot" style="width:48px;height:48px;font-size:1.5rem;display:inline-flex;align-items:center;justify-content:center;">&#10084;</span>
        <h3 class="mt-3 fw-bold">Welcome Back</h3>
        <p class="sub">Sign in to your HeartCare AI account</p>
      </div>

      {% if error %}
      <div class="alert alert-danger rounded-4 mb-3">{{ error }}</div>
      {% endif %}

      <form action="/login" method="post">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-glow btn-lg w-100">Sign In</button>
      </form>

      <div class="text-center mt-4 mini">
        Don't have an account? <a href="/signup" style="color:rgba(167,139,250,.95)">Create one free</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
