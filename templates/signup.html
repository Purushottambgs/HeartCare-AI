{% extends 'base.html' %}
{% set title = 'HeartCare AI • Sign Up' %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="form-card p-4 p-md-5 slide-up">
      <div class="text-center mb-4">
        <span class="brand-dot" style="width:48px;height:48px;font-size:1.5rem;display:inline-flex;align-items:center;justify-content:center;">&#10084;</span>
        <h3 class="mt-3 fw-bold">Create Account</h3>
        <p class="sub">Join HeartCare AI and start tracking your heart health</p>
      </div>

      {% if error %}
      <div class="alert alert-danger rounded-4 mb-3">{{ error }}</div>
      {% endif %}

      <form action="/signup" method="post">
        <div class="mb-3">
          <label class="form-label">Username <span class="text-danger">*</span></label>
          <input type="text" name="username" class="form-control" placeholder="Choose a username" required autofocus minlength="3">
        </div>
        <div class="mb-3">
          <label class="form-label">Email <span class="mini">(optional)</span></label>
          <input type="email" name="email" class="form-control" placeholder="your@email.com">
        </div>
        <div class="mb-3">
          <label class="form-label">Password <span class="text-danger">*</span></label>
          <input type="password" name="password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
        </div>
        <div class="mb-4">
          <label class="form-label">Confirm Password <span class="text-danger">*</span></label>
          <input type="password" name="confirm" class="form-control" placeholder="Repeat password" required>
        </div>
        <button type="submit" class="btn btn-glow btn-lg w-100">Create Account</button>
      </form>

      <div class="text-center mt-4 mini">
        Already have an account? <a href="/login" style="color:rgba(167,139,250,.95)">Sign in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
